<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NoteSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --surface2: #22263a;
      --border:   #2e3247;
      --accent:   #7c6ff7;
      --accent2:  #a78bfa;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --danger:   #f87171;
      --success:  #34d399;
      --cat1: #7c6ff7; --cat2: #f59e0b; --cat3: #34d399; --cat4: #f87171;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--accent2); }
    .logo span { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    #note-count {
      font-size: 12px; background: var(--surface2);
      border: 1px solid var(--border); padding: 4px 12px;
      border-radius: 20px; color: var(--muted);
    }
    #note-count b { color: var(--accent2); }

    /* ── LAYOUT ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .form-card h2 {
      font-size: 14px; font-weight: 500;
      color: var(--muted); margin-bottom: 1rem;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
    input, textarea, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }

    .btn {
      padding: 10px 24px; border-radius: 10px;
      border: none; cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 500;
      transition: all .2s;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); padding: 6px 14px; font-size: 12px; }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-edit { background: transparent; color: var(--accent2); border: 1px solid var(--accent); padding: 6px 14px; font-size: 12px; }
    .btn-edit:hover { background: var(--accent); color: #fff; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .filter-bar span { font-size: 12px; color: var(--muted); }
    .filter-btn {
      padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    #search {
      margin-left: auto; width: 220px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px;
    }

    /* ── NOTES GRID ── */
    #notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      display: flex; flex-direction: column;
      gap: .75rem;
      transition: transform .2s, border-color .2s;
      animation: fadeIn .3s ease;
    }
    .note-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .note-top { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
    .note-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
    .cat-badge {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .cat-General  { background: #7c6ff720; color: #7c6ff7; }
    .cat-Work     { background: #f59e0b20; color: #f59e0b; }
    .cat-Personal { background: #34d39920; color: #34d399; }
    .cat-Ideas    { background: #f8717120; color: #f87171; }

    .note-content {
      font-size: 13px; color: var(--muted);
      line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .note-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }
    .note-date { font-size: 11px; color: var(--muted); }
    .note-actions { display: flex; gap: 6px; }

    /* ── EMPTY STATE ── */
    #empty-state {
      text-align: center; padding: 4rem 2rem;
      display: none;
    }
    #empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
    #empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: .5rem; }
    #empty-state p { font-size: 14px; color: var(--muted); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 12px 20px; border-radius: 12px;
      font-size: 13px; opacity: 0; pointer-events: none;
      transition: opacity .3s; z-index: 999;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--success); color: var(--success); }
    #toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
      z-index: 200; display: none;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2rem; width: 100%; max-width: 480px;
    }
    .modal h3 { font-size: 16px; margin-bottom: 1.25rem; }
    .modal-actions { display: flex; gap: .75rem; margin-top: 1.25rem; justify-content: flex-end; }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      nav { padding: 1rem; }
      .container { padding: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">Note<span>Space</span></div>
  <div class="nav-right">
    <span id="note-count"><b id="count-num">0</b> notes</span>
  </div>
</nav>

<div class="container">

  <!-- CREATE FORM -->
  <div class="form-card">
    <h2>✏️ New Note</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="title" placeholder="Note title..." />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="General">General</option>
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Ideas">Ideas</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:1rem;">
      <label>Content</label>
      <textarea id="content" placeholder="Write your note here..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="createNote()">+ Add Note</button>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span>Filter:</span>
    <button class="filter-btn active" onclick="filterNotes('All', this)">All</button>
    <button class="filter-btn" onclick="filterNotes('General', this)">General</button>
    <button class="filter-btn" onclick="filterNotes('Work', this)">Work</button>
    <button class="filter-btn" onclick="filterNotes('Personal', this)">Personal</button>
    <button class="filter-btn" onclick="filterNotes('Ideas', this)">Ideas</button>
    <input type="text" id="search" placeholder="Search notes..." oninput="searchNotes(this.value)" />
  </div>

  <!-- NOTES GRID -->
  <div id="notes-grid"></div>

  <!-- EMPTY STATE -->
  <div id="empty-state">
    <div class="emoji">📝</div>
    <h3>No notes yet</h3>
    <p>Create your first note above to get started.</p>
  </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <h3>Edit Note</h3>
    <div class="form-group" style="margin-bottom:.75rem;">
      <label>Title</label>
      <input type="text" id="edit-title" />
    </div>
    <div class="form-group" style="margin-bottom:.75rem;">
      <label>Category</label>
      <select id="edit-category">
        <option>General</option><option>Work</option>
        <option>Personal</option><option>Ideas</option>
      </select>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea id="edit-content" style="min-height:120px;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" style="background:var(--surface2);color:var(--muted);" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  let allNotes = [];
  let currentFilter = 'All';
  let editingId = null;

  // ── FETCH NOTES ──────────────────────────────────────
  async function fetchNotes() {
    const res = await fetch('/api/notes');
    const data = await res.json();
    allNotes = data.notes;
    renderNotes(allNotes);
    document.getElementById('count-num').textContent = allNotes.length;
  }

  // ── RENDER ───────────────────────────────────────────
  function renderNotes(notes) {
    const grid = document.getElementById('notes-grid');
    const empty = document.getElementById('empty-state');

    if (notes.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = notes.map(n => `
      <div class="note-card" id="card-${n.id}">
        <div class="note-top">
          <div class="note-title">${escHtml(n.title)}</div>
          <span class="cat-badge cat-${n.category}">${n.category}</span>
        </div>
        <div class="note-content">${escHtml(n.content)}</div>
        <div class="note-footer">
          <span class="note-date">${n.created_at}</span>
          <div class="note-actions">
            <button class="btn btn-edit" onclick="openEdit('${n.id}')">Edit</button>
            <button class="btn btn-danger" onclick="deleteNote('${n.id}')">Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  // ── CREATE ───────────────────────────────────────────
  async function createNote() {
    const title = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const category = document.getElementById('category').value;

    if (!title || !content) { showToast('Title and content are required', 'error'); return; }

    const res = await fetch('/api/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, category })
    });

    if (res.ok) {
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      document.getElementById('category').value = 'General';
      showToast('Note created!', 'success');
      fetchNotes();
    }
  }

  // ── DELETE ───────────────────────────────────────────
  async function deleteNote(id) {
    await fetch(`/api/notes/${id}`, { method: 'DELETE' });
    showToast('Note deleted', 'success');
    fetchNotes();
  }

  // ── EDIT ─────────────────────────────────────────────
  function openEdit(id) {
    const note = allNotes.find(n => n.id === id);
    if (!note) return;
    editingId = id;
    document.getElementById('edit-title').value = note.title;
    document.getElementById('edit-content').value = note.content;
    document.getElementById('edit-category').value = note.category;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null;
  }

  async function saveEdit() {
    const title = document.getElementById('edit-title').value.trim();
    const content = document.getElementById('edit-content').value.trim();
    const category = document.getElementById('edit-category').value;
    if (!title || !content) { showToast('Fields cannot be empty', 'error'); return; }

    await fetch(`/api/notes/${editingId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, content, category })
    });
    closeModal();
    showToast('Note updated!', 'success');
    fetchNotes();
  }

  // ── FILTER ───────────────────────────────────────────
  function filterNotes(cat, btn) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = cat === 'All' ? allNotes : allNotes.filter(n => n.category === cat);
    renderNotes(filtered);
  }

  // ── SEARCH ───────────────────────────────────────────
  function searchNotes(query) {
    const q = query.toLowerCase();
    const filtered = allNotes.filter(n =>
      n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)
    );
    renderNotes(filtered);
  }

  // ── TOAST ────────────────────────────────────────────
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 2500);
  }

  // ── UTIL ─────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── ENTER KEY ────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  fetchNotes();
</script>
</body>
</html>
